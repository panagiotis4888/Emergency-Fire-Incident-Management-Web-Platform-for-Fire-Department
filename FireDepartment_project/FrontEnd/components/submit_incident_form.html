<form id="incidentForm">
    <div class="form-group">
        <label for="incidentType">Incident Type</label>
        <input type="text" id="incidentType" placeholder="accident or fire" required>
    </div>
    <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" rows="4" placeholder="Describe the incident..." required></textarea>
    </div>
    <div class="form-group">
        <label for="userPhone">User Phone</label>
        <input type="tel" id="userPhone" placeholder="e.g., 6977771111" required>
    </div>
    <div class="form-group">
        <label for="address">Address</label>
        <input type="text" id="address" placeholder="e.g., Agia Pelagia" required>
    </div>
    <div class="form-group">
        <label for="prefecture">Prefecture</label>
        <input type="text" id="prefecture" placeholder="e.g., Heraklion" required>
    </div>
    <div class="form-group">
        <label for="municipality">Municipality</label>
        <input type="text" id="municipality" placeholder="e.g., Malevizi" required>
    </div>
    <div class="form-group">
        <label for="latitude">Latitude</label>
        <input type="number" step="any" id="latitude" placeholder="Enter latitude" required>
    </div>
    <div class="form-group">
        <label for="longitude">Longitude</label>
        <input type="number" step="any" id="longitude" placeholder="Enter longitude" required>
    </div>
    <button type="submit" class="button">Submit Incident</button>
</form>
