<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script src="/js/VolunteerRegister.js" defer></script>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <title>Volunteer Register</title>
    <script src="http://www.openlayers.org/api/OpenLayers.js"></script>
</head>
<body>
    <div class="container">
    <form onsubmit="return handleSubmit(event)">
        <label for="username">Username:</label>
        <input 
            type="text" 
            id="username" 
            name="username" 
            placeholder="Enter your username" 
            pattern="[A-Za-z][A-Za-z0-9]{7,}" 
            title="Username must be at least 8 characters long and start with a letter" 
            required>
        <span id="usernameWarning"></span>
        <br><br>
        <label for="email">Email:</label>
        <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
            title="Please enter a valid email address"
            required>
        <span id="emailWarning"></span>
        <br><br>
        <label for="password">Password:</label>
        <div style="position: relative;">
            <input 
                type="password" 
                id="password" 
                name="password" 
                placeholder="Enter your password"  
                title="Password will be strong if you include 1 capital letter, 1 lowercase letter, 1 symbol, and 1 number" 
                required>
            <button type="button" onclick="togglePassword('password')" style="position: absolute; right: 0px; top: 82%; transform: translateY(-80%);">👁️</button>
        </div>
        <div id="passwordMessage1"></div>
        <div id="passwordType"></div>
        <br><br>
        <label for="confirmPassword">Confirm Password:</label>
        <div style="position: relative;">
            <input 
                type="password" 
                id="confirmPassword" 
                name="confirmPassword" 
                placeholder="Confirm your password" 
                title="Please confirm your password" 
                required>
            <button type="button" onclick="togglePassword('confirmPassword')" style="position: absolute; right: 0px; top: 82%; transform: translateY(-80%);">👁️</button>
        </div>
        <div id="passwordMessage2"></div>
        <br><br>
        <label for="firstname">First Name:</label>
        <input 
            type="text" 
            id="firstname"
            name="firstname"
            placeholder="Enter your first name" 
            pattern="[A-Za-z]{3,30}" 
            title="First name must be 3-30 characters long and not contain numbers" 
            required>
        <br><br>
        <label for="lastname">Last Name:</label>
        <input 
            type="text" 
            id="lastname"
            name="lastname"
            placeholder="Enter your last name" 
            pattern="[A-Za-z]{3,30}" 
            title="Last name must be 3-30 characters long and not contain numbers" 
            required>
        <br><br>
        <label for="birthdate">Date of Birth:</label>
        <input 
            type="date"
            id="birthdate" 
            name="birthdate" 
            value="2000-01-01" 
            min="1920-01-01" 
            max="2011-12-31">
        <div id="dateMessage"></div>
        <br><br>
        <label for="gender">Gender:</label>
        <br>
        <input 
            type="radio"
            id="male" 
            name="gender" 
            value="male" 
            required>
        <label for="male">Male</label>
        <br>
        <input 
            type="radio" 
            id="female" 
            name="gender" 
            value="female">
        <label for="female">Female</label>
        <br>
        <input 
            type="radio" 
            id="other" 
            name="gender" 
            value="other">
        <label for="other">Other</label>
        <br><br>
        <label for="afm">AFM:</label>
        <input 
            type="text" 
            id="afm" 
            name="afm" 
            placeholder="Enter your AFM" 
            pattern="\d{10}" 
            title="AFM must be exactly 10 numbers" 
            required>
        <br><br>
        <select 
            id="volunteer_type" 
            name="volunteer_type">
            <option value="simple">Simple</option>
            <option value="driver">Driver</option>
            </select>
            <br><br>       
            <label for="height">Height (1.45 - 2.20m):</label>
            <input 
                type="number" 
                id="height" 
                name="height"
                value="1.45"
                min="1.45" 
                max="2.20" 
                step="0.01">
            <br><br>        
            <label for="weight">Weight (40 - 160kg):</label>
            <input 
                type="number" 
                id="weight" 
                name="weight" 
                value="40"
                min="40" 
                max="160">
            <br><br>
        <label for="prefecture">Prefecture:</label>
        <select 
            id="prefecture" 
            name="prefecture" 
            required>
            <option value="" disabled selected>Select your prefecture</option>
            <option value="heraklion">Heraklion</option>
            <option value="chania">Chania</option>
            <option value="rethymno">Rethymno</option>
            <option value="lasithi">Lasithi</option>
        </select>
        <br><br>
        <label for="municipality">Municipality:</label>
        <input 
            type="text" 
            id="municipality" 
            name="municipality" 
            placeholder="Enter your municipality" 
            pattern="[A-Za-z\s]{3,30}" 
            title="Municipality must be 3-30 characters long and contain only letters and spaces" 
            required>
        <br><br>
        <label for="address">Address:</label>
        <input 
            type="text" 
            id="address" 
            name="address" 
            placeholder="Enter your address" 
            pattern=".{10,150}" 
            title="Address must be 10-150 characters long" 
            required>
        <br>
        <button 
            type="button"
            class="button"
            onclick="Check()">
            Check
        </button>
        <div id="apiData"></div>
        <div id="map" class="smallmap"></div>
        <br><br>
        <input type="hidden" id="latitude" name="latitude" >
        <input type="hidden" id="longitude" name="longitude">
        <label for="job">Job:</label>
        <input 
            type="text" 
            id="job" 
            name="job" 
            placeholder="Enter your job" 
            pattern="[A-Za-z\s]{3,30}" 
            title="Job must be 3-30 characters long and contain only letters and spaces" 
            required>
        <br><br>
        <label for="telephone">Telephone:</label>
        <input 
            type="text" 
            id="telephone" 
            name="telephone" 
            placeholder="Enter your telephone number" 
            pattern="\d{10,14}" 
            title="Telephone must be 10-14 digits long" 
            required>
        <span id="phoneWarning"></span>
        <br><br>
        <input 
            type="checkbox" 
            id="agreement" 
            name="agreement" 
            required>
        <label 
            for="agreement" 
            id="agreement-label">
            I declare responsibly that I belong to the active force of volunteer firefighters.
        </label>
        <br><br>
        <button 
            id="button" 
            type="submit" 
            class="button">
            Register
        </button>
    </form>
    <br><br>
    <div id="output"></div>
    <div
        id="formData"
        class="json_data">
    </div>
    </div>
    <script src="/js/map.js"></script>
</body>
</html>
